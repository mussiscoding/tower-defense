<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="40" height="40" fill="none"/>
  
  <!-- Body -->
  <ellipse cx="20" cy="18" rx="8" ry="10" fill="#4a7c59"/>
  
  <!-- Head -->
  <circle cx="20" cy="8" r="6" fill="#4a7c59"/>
  
  <!-- Eyes -->
  <circle cx="18" cy="7" r="1" fill="#2d4a2d"/>
  <circle cx="22" cy="7" r="1" fill="#2d4a2d"/>
  
  <!-- Nose -->
  <circle cx="20" cy="9" r="0.5" fill="#2d4a2d"/>
  
  <!-- Arms -->
  <ellipse cx="14" cy="12" rx="3" ry="4" fill="#4a7c59"/>
  <ellipse cx="26" cy="12" rx="3" ry="4" fill="#4a7c59"/>
  
  <!-- Leg - Right foot forward (only one leg visible) -->
  <ellipse cx="20" cy="25" rx="2" ry="4" fill="#4a7c59" transform="rotate(45 20 25)"/>
  <!-- Foot -->
  <ellipse cx="20" cy="29" rx="3" ry="2" fill="#4a7c59" transform="rotate(45 20 29)"/>
</svg> 